<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Z-Resto</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 20px;
      color: #111827;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .retry-btn {
      background: #059669;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover {
      background: #047857;
    }
    .retry-btn:active {
      transform: scale(0.98);
    }
    .tip {
      margin-top: 24px;
      padding: 12px;
      background: #fef3c7;
      border-radius: 8px;
      font-size: 12px;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Tidak Ada Koneksi</h1>
    <p>Perangkat kamu sedang offline. Pastikan koneksi internet tersedia dan coba lagi.</p>
    <button class="retry-btn" onclick="window.location.reload()">Coba Lagi</button>
    <div class="tip">
      💡 Tips: Beberapa data mungkin masih tersedia di cache untuk sementara waktu.
    </div>
  </div>
</body>
</html>
